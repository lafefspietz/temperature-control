<script>
function setup() {
    frameRate(10);
    var httpc = new XMLHttpRequest();
    httpc.onreadystatechange = function() {
        if (this.readyState == 4 && this.status == 200) {
            temperature = JSON.parse(this.responseText);
            document.getElementById("databox").value = this.responseText;
        }
    };
    httpc.open("GET", "load-file.php?filename=temperature.json", true);
    httpc.send();
}

previous_time = "";

function draw(){
    var httpc = new XMLHttpRequest();
    httpc.onreadystatechange = function() {
        if (this.readyState == 4 && this.status == 200) {
            temperature = JSON.parse(this.responseText);
            document.getElementById("databox").value = this.responseText;
            previous_time = temperature.datetime;
        }

}
